<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文化×游戏联动 Mapping 地图</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #a1a1a6;
    --border: #e5e5ea;
    --accent: #0071e3;
    --accent-light: #e8f2ff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
    --radius: 14px;
    --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC',
             'Helvetica Neue', 'Microsoft YaHei', sans-serif;
    --color-S: #ff6b6b;
    --color-A: #ffa94d;
    --color-B: #51cf66;
    --color-C: #339af0;
    --color-D: #a9a9a9;
    --culture-color: #7c3aed;
    --game-color: #2563eb;
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* ========== Layout ========== */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 52px 1fr 280px;
    height: 100vh;
    width: 100vw;
  }

  /* ========== Header ========== */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    z-index: 20;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, var(--culture-color), var(--game-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .header-stats {
    display: flex;
    gap: 20px;
  }

  .header-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .header-stat strong {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  /* ========== Sidebar ========== */
  .sidebar {
    grid-row: 2 / 4;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
  }

  .sidebar-body::-webkit-scrollbar { width: 3px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }

  .filter-section { margin-bottom: 20px; }

  .filter-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-section h3 .icon { font-size: 13px; }

  .filter-group { display: flex; flex-direction: column; gap: 3px; }

  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s;
    user-select: none;
  }

  .filter-item:hover { background: var(--bg); }

  .filter-item input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    transition: all .12s;
    flex-shrink: 0;
  }

  .filter-item input:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .filter-item input:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 4.5px;
    height: 8px;
    border: solid #fff;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }

  .filter-item label {
    font-size: 13px;
    cursor: pointer;
    flex: 1;
  }

  .filter-item .count {
    font-size: 11px;
    color: var(--text-tertiary);
    min-width: 16px;
    text-align: right;
  }

  /* Legend */
  .legend-box {
    margin-bottom: 20px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
  }

  .legend-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }

  .legend-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-line {
    width: 18px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-shape {
    width: 10px;
    height: 10px;
    flex-shrink: 0;
  }

  .depth-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
  }

  .depth-row span { font-size: 10px; color: var(--text-tertiary); }

  .depth-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, #e0e0e0, var(--accent));
  }

  /* Time slider */
  .time-section { padding: 0 18px 18px; }

  .time-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-tertiary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .time-display {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
    text-align: center;
    margin-bottom: 6px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent), var(--accent));
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    cursor: pointer;
  }

  /* ========== Canvas area ========== */
  .graph-area {
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  #graphCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #graphCanvas:active { cursor: grabbing; }

  .graph-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
  }

  .graph-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-secondary);
    transition: all .12s;
  }

  .graph-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Tooltip */
  .tooltip {
    display: none;
    position: fixed;
    background: rgba(255,255,255,.96);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    box-shadow: var(--shadow-md);
    max-width: 320px;
    pointer-events: none;
    z-index: 50;
    font-size: 13px;
    line-height: 1.5;
  }

  .tooltip.show { display: block; }

  .tooltip-title {
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tooltip-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
  }

  .tooltip-desc {
    color: var(--text-secondary);
    font-size: 12px;
  }

  .tooltip-link-info {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* ========== Bottom Panel ========== */
  .bottom-panel {
    grid-column: 2 / -1;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    gap: 0;
    flex-shrink: 0;
  }

  .panel-tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--font);
  }

  .panel-tab:hover { color: var(--text-primary); }
  .panel-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .panel-tab .tab-icon { font-size: 15px; }

  .panel-content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .tab-pane {
    display: none;
    position: absolute;
    inset: 0;
    padding: 16px 20px;
    overflow-y: auto;
  }

  .tab-pane.active { display: block; }

  .tab-pane::-webkit-scrollbar { width: 3px; }
  .tab-pane::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }

  /* -- Tab1: 热度趋势 -- */
  .trend-chart {
    width: 100%;
    height: 100%;
  }

  /* -- Tab2: 效果对比 -- */
  .radar-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    height: 100%;
    overflow-y: auto;
    align-content: start;
  }

  .compare-card {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .compare-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .compare-name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .compare-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    background: #dbeafe;
    color: #2563eb;
  }

  .compare-score {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
  }

  .compare-bars {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-label {
    font-size: 11px;
    color: var(--text-secondary);
    width: 56px;
    flex-shrink: 0;
    text-align: right;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .bar-value {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    width: 32px;
    flex-shrink: 0;
  }

  /* -- Tab3: 案例详情（三层导航） -- */
  .case-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .case-nav-back {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    margin-bottom: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--accent-light);
    transition: background .12s;
  }

  .case-nav-back:hover { background: #d1e5ff; }

  .culture-group-card {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .culture-group-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-sm);
  }

  .culture-group-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .culture-group-name {
    font-size: 14px;
    font-weight: 600;
  }

  .culture-group-meta {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .culture-group-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .culture-group-count {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .culture-group-arrow {
    color: var(--text-tertiary);
    font-size: 16px;
  }

  .case-card {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }

  .case-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-sm);
  }

  .case-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .case-pair {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .case-arrow {
    color: var(--text-tertiary);
    font-size: 12px;
  }

  .case-badges {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .case-rating {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    color: #fff;
  }

  .case-depth {
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 1px;
  }

  .case-note {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ========== Modal ========== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.3);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    max-width: 580px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    animation: modalIn .2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(.96) translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  .modal-head {
    padding: 20px 24px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .modal-head h2 {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
  }

  .modal-type-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
    margin-left: 8px;
    vertical-align: middle;
  }

  .badge-culture { background: #f3e8ff; color: #7c3aed; }
  .badge-game { background: #dbeafe; color: #2563eb; }

  .modal-close-btn {
    width: 26px; height: 26px;
    border: none;
    background: var(--bg);
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 10px;
  }

  .modal-close-btn:hover { background: #e5e5ea; }

  .modal-content {
    padding: 0 24px 20px;
  }

  .modal-desc-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .modal-relations { display: flex; flex-direction: column; gap: 6px; }

  .modal-rel-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 6px;
  }

  .rel-left { display: flex; flex-direction: column; gap: 2px; }

  .rel-name { font-size: 13px; font-weight: 500; }

  .rel-meta { font-size: 11px; color: var(--text-tertiary); }

  .rel-rating {
    font-size: 12px;
    font-weight: 700;
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    color: #fff;
  }

  /* ========== Case Detail Styles ========== */
  .detail-section {
    margin-bottom: 14px;
  }

  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
  }

  .detail-label {
    font-size: 12px;
    color: var(--text-tertiary);
    min-width: 64px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .detail-value {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.5;
  }

  .detail-heading {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .detail-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
  }

  .detail-missing {
    border-left: 3px solid #ffa94d;
    color: #b45309;
    background: #fffbeb;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-logo">文化×游戏 联动 Mapping 地图</span>
      <div class="header-divider"></div>
      <span class="header-subtitle">全球文化资产 · 游戏产品联动关系网络</span>
    </div>
    <div class="header-stats">
      <div class="header-stat"><strong id="hCulture">24</strong> 文化主题</div>
      <div class="header-stat"><strong id="hGame">31</strong> 游戏产品</div>
      <div class="header-stat"><strong id="hLink">57</strong> 联动关系</div>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-body">
      <!-- Legend -->
      <div class="legend-box">
        <div class="legend-title">图例</div>
        <div class="legend-row">
          <div class="legend-item"><div class="legend-dot" style="background:#e8dff7;border:1.5px solid #c4b0e8"></div>文化主题</div>
          <div class="legend-item"><div class="legend-shape" style="background:#e4f0ff;border:1.5px solid #b0d0f0;border-radius:3px"></div>游戏产品</div>
        </div>
        <div class="legend-row" style="margin-top:8px">
          <div class="legend-item"><div class="legend-line" style="background:var(--color-S)"></div>S</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--color-A)"></div>A</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--color-B)"></div>B</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--color-C)"></div>C</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--color-D)"></div>D</div>
        </div>
        <div class="depth-row">
          <span>浅</span><div class="depth-bar"></div><span>深</span>
        </div>
      </div>

      <!-- 文化类型 -->
      <div class="filter-section">
        <h3><span class="icon">📋</span> 文化主题筛选器</h3>
        <div class="filter-group" id="cultureFilters"></div>
      </div>

      <!-- 游戏品类 -->
      <div class="filter-section">
        <h3><span class="icon">🎮</span> 游戏品类筛选器</h3>
        <div class="filter-group" id="gameFilters"></div>
      </div>
    </div>

    <!-- 时间范围 -->
    <div class="time-section">
      <div class="time-label"><span class="icon">🕐</span> 时间范围</div>
      <div class="time-display" id="timeDisplay">2015 – 2026</div>
      <input type="range" id="timeSlider" min="2015" max="2026" value="2026" step="1" oninput="handleTimeChange(this.value)">
    </div>
  </aside>

  <!-- Central Graph -->
  <div class="graph-area">
    <canvas id="graphCanvas"></canvas>
    <div class="graph-controls">

const ratingColors = { S:'#ff6b6b', A:'#ffa94d', B:'#51cf66', C:'#339af0', D:'#a9a9a9' };
const allNodes = [...cultureNodes, ...gameNodes];
const nodeMap = {};
allNodes.forEach(n => nodeMap[n.id] = n);

// ===================================================================
// STATE
// ===================================================================
let activeCultureTypes = new Set(cultureTypes);
let activeGameGenres = new Set(gameGenres);
let currentMaxYear = 2026;
let allFiltersOn = true;

// ===================================================================
// FILTERS
// ===================================================================
function initFilters() {
  const cEl = document.getElementById('cultureFilters');
  const cCount = {};
  cultureNodes.forEach(n => { cCount[n.category] = (cCount[n.category]||0)+1; });
  cultureTypes.forEach(ct => {
    cEl.innerHTML += `<div class="filter-item">
      <input type="checkbox" checked id="cf_${ct}" data-type="culture" data-value="${ct}" onchange="handleFilter(this)">
      <label for="cf_${ct}">${ct}</label>
      <span class="count">${cCount[ct]||0}</span></div>`;
  });

  const gEl = document.getElementById('gameFilters');
  const gCount = {};
  gameNodes.forEach(n => { gCount[n.genre] = (gCount[n.genre]||0)+1; });
  gameGenres.forEach(gg => {
    gEl.innerHTML += `<div class="filter-item">
      <input type="checkbox" checked id="gf_${gg}" data-type="game" data-value="${gg}" onchange="handleFilter(this)">
      <label for="gf_${gg}">${gg}</label>
      <span class="count">${gCount[gg]||0}</span></div>`;
  });
}

function handleFilter(el) {
  const t = el.dataset.type, v = el.dataset.value;
  if (t === 'culture') el.checked ? activeCultureTypes.add(v) : activeCultureTypes.delete(v);
  else el.checked ? activeGameGenres.add(v) : activeGameGenres.delete(v);
  updateAll();
}

function handleTimeChange(val) {
  currentMaxYear = parseInt(val);
  document.getElementById('timeDisplay').textContent = `2015 – ${currentMaxYear}`;
  updateAll();
}

function getFiltered() {
  const vis = cultureNodes.filter(n => activeCultureTypes.has(n.category) && n.year <= currentMaxYear);
  const vg  = gameNodes.filter(n => activeGameGenres.has(n.genre) && n.year <= currentMaxYear);
  const ids = new Set([...vis,...vg].map(n=>n.id));
  const vl  = links.filter(l => ids.has(l.source) && ids.has(l.target) && l.year <= currentMaxYear);
  const linked = new Set();
  vl.forEach(l => { linked.add(l.source); linked.add(l.target); });
  // 合并同源链接用于力导向图（取最高rating和最大depth）
  const mergedMap = {};
  const ratingOrder = {S:5,A:4,B:3,C:2,D:1};
  vl.forEach(l => {
    const key = l.source + '|' + l.target;
    if (!mergedMap[key] || ratingOrder[l.rating] > ratingOrder[mergedMap[key].rating]) {
      mergedMap[key] = {...l};
    }
    if (mergedMap[key].depth < l.depth) mergedMap[key].depth = l.depth;
  });
  const mergedLinks = Object.values(mergedMap);
  return { nodes: [...vis,...vg].filter(n=>linked.has(n.id)), links: vl, mergedLinks };
}

function updateAll() {
  const d = getFiltered();
  document.getElementById('hCulture').textContent = d.nodes.filter(n=>n.type==='culture').length;
  document.getElementById('hGame').textContent = d.nodes.filter(n=>n.type==='game').length;
  document.getElementById('hLink').textContent = d.links.length;
  initForceGraph(d);
  renderTrend(d);
  renderRadar(d);
  renderCases(d);
}

// ===================================================================
// FORCE-DIRECTED GRAPH (pure canvas)
// ===================================================================
let graphNodes = [], graphEdges = [];
let canvas, ctx, W, H;
let scale = 1, offsetX = 0, offsetY = 0;
let dragging = null, panning = false, panStart = {x:0,y:0}, panOffset = {x:0,y:0};
let hoveredNode = null, hoveredEdge = null;
let simTimer = null;

function initForceGraph(data) {
  canvas = document.getElementById('graphCanvas');
  ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

  // Create nodes
  const existing = {};
  graphNodes.forEach(n => existing[n.id] = { x: n.x, y: n.y });

  const edgeData = data.mergedLinks || data.links;

  graphNodes = data.nodes.map(n => {
    const lc = edgeData.filter(l => l.source === n.id || l.target === n.id).length;
    const r = n.type === 'culture' ? 18 + lc * 2.5 : 16 + lc * 2;
    const prev = existing[n.id];
    return {
      id: n.id, name: n.name, type: n.type,
      category: n.category, genre: n.genre, desc: n.desc,
      r,
      x: prev ? prev.x : W/2 + (Math.random()-0.5) * W * 0.6,
      y: prev ? prev.y : H/2 + (Math.random()-0.5) * H * 0.6,
      vx: 0, vy: 0,
    };
  });

  const nodeIdx = {};
  graphNodes.forEach((n,i) => nodeIdx[n.id] = i);

  graphEdges = edgeData.map(l => ({
    source: nodeIdx[l.source],
    target: nodeIdx[l.target],
    depth: l.depth,
    rating: l.rating,
    note: l.note,
    sourceId: l.source,
    targetId: l.target,
  })).filter(e => e.source !== undefined && e.target !== undefined);

  // Run simulation
  if (simTimer) cancelAnimationFrame(simTimer);
  let tickCount = 0;
  const maxTicks = 400;
  const alpha0 = 1;

  function tick() {
    tickCount++;
    const alpha = alpha0 * Math.max(0, 1 - tickCount / maxTicks);
    if (alpha < 0.005) { drawGraph(); return; }

    // Forces
    const N = graphNodes.length;
    // repulsion (scaled for larger graph)
    for (let i = 0; i < N; i++) {
      for (let j = i+1; j < N; j++) {
        let dx = graphNodes[j].x - graphNodes[i].x;
        let dy = graphNodes[j].y - graphNodes[i].y;
        let d2 = dx*dx + dy*dy;
        if (d2 < 1) d2 = 1;
        const f = 12000 / d2;
        const fx = dx / Math.sqrt(d2) * f * alpha;
        const fy = dy / Math.sqrt(d2) * f * alpha;
        graphNodes[i].vx -= fx;
        graphNodes[i].vy -= fy;
        graphNodes[j].vx += fx;
        graphNodes[j].vy += fy;
      }
    }

    // attraction
    graphEdges.forEach(e => {
      const a = graphNodes[e.source], b = graphNodes[e.target];
      let dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const ideal = 100 + (5 - e.depth) * 15;
      const f = (d - ideal) * 0.004 * alpha;
      const fx = dx/d * f, fy = dy/d * f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    });

    // gravity (stronger to keep large graph centered)
    graphNodes.forEach(n => {
      n.vx += (W/2 - n.x) * 0.001 * alpha;
      n.vy += (H/2 - n.y) * 0.001 * alpha;
    });

    // integrate
    graphNodes.forEach(n => {
      if (n === dragging) return;
      n.vx *= 0.6;
      n.vy *= 0.6;
      n.x += n.vx;
      n.y += n.vy;
      n.x = Math.max(n.r, Math.min(W - n.r, n.x));
      n.y = Math.max(n.r, Math.min(H - n.r, n.y));
    });

    drawGraph();
    simTimer = requestAnimationFrame(tick);
  }

  tick();
}

function drawGraph() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // draw edges — soft, muted colors
  graphEdges.forEach(e => {
    const a = graphNodes[e.source], b = graphNodes[e.target];
    const isHover = hoveredNode && (graphNodes[e.source] === hoveredNode || graphNodes[e.target] === hoveredNode);
    const isFaded = hoveredNode && !isHover;
    const isEdgeHover = hoveredEdge === e;

    ctx.beginPath();
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const dx = b.x - a.x, dy = b.y - a.y;
    const cx = mx + dy * 0.1, cy = my - dx * 0.1;
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(cx, cy, b.x, b.y);
    // muted edge colors based on rating
    const edgeColors = { S:'#e8a0a0', A:'#e8c89a', B:'#a0d4a8', C:'#a0c4e8', D:'#c8c8c8' };
    ctx.strokeStyle = isHover || isEdgeHover ? ratingColors[e.rating] : edgeColors[e.rating];
    ctx.lineWidth = (isEdgeHover ? e.depth * 1.5 : e.depth * 0.8) + 0.5;
    ctx.globalAlpha = isFaded ? 0.06 : (isHover || isEdgeHover ? 0.8 : 0.3);
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // draw nodes — minimal, soft style
  graphNodes.forEach(n => {
    const isHover = n === hoveredNode;
    const isAdjacent = hoveredNode && graphEdges.some(e =>
      (graphNodes[e.source] === hoveredNode && graphNodes[e.target] === n) ||
      (graphNodes[e.target] === hoveredNode && graphNodes[e.source] === n));
    const isFaded = hoveredNode && !isHover && !isAdjacent;

    ctx.globalAlpha = isFaded ? 0.2 : 1;

    // subtle shadow
    ctx.shadowColor = 'rgba(0,0,0,.06)';
    ctx.shadowBlur = isHover ? 12 : 4;
    ctx.shadowOffsetY = 1;

    const r = isHover ? n.r * 1.08 : n.r;
    if (n.type === 'culture') {
      // soft circle — unified purple tone
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = isHover ? '#c4b0e8' : '#d4c5f0';
      ctx.fill();
      ctx.lineWidth = isHover ? 2 : 1.5;
      ctx.strokeStyle = isHover ? '#9b7dd4' : '#d4c5f0';
      ctx.stroke();
    } else {
      // soft rounded rect — unified blue tone
      const s = r * 1.5;
      const rr = 6;
      const x0 = n.x - s/2, y0 = n.y - s/2;
      ctx.beginPath();
      ctx.moveTo(x0+rr, y0);
      ctx.lineTo(x0+s-rr, y0);
      ctx.arcTo(x0+s, y0, x0+s, y0+rr, rr);
      ctx.lineTo(x0+s, y0+s-rr);
      ctx.arcTo(x0+s, y0+s, x0+s-rr, y0+s, rr);
      ctx.lineTo(x0+rr, y0+s);
      ctx.arcTo(x0, y0+s, x0, y0+s-rr, rr);
      ctx.lineTo(x0, y0+rr);
      ctx.arcTo(x0, y0, x0+rr, y0, rr);
      ctx.closePath();
      ctx.fillStyle = isHover ? '#b0ccf0' : '#c5daf0';
      ctx.fill();
      ctx.lineWidth = isHover ? 2 : 1.5;
      ctx.strokeStyle = isHover ? '#7aabe8' : '#c5daf0';
      ctx.stroke();
    }

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // label
    ctx.font = `500 ${isHover ? 12 : 10.5}px -apple-system, "PingFang SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = isFaded ? 'rgba(29,29,31,.1)' : (isHover ? '#1d1d1f' : '#6e6e73');
    ctx.fillText(n.name, n.x, n.y + r + 14);
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

// ===================================================================
// GRAPH INTERACTION
// ===================================================================
function screenToGraph(sx, sy) {
  return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale };
}

function hitTestNode(gx, gy) {
  for (let i = graphNodes.length - 1; i >= 0; i--) {
    const n = graphNodes[i];
    const dx = gx - n.x, dy = gy - n.y;
    if (dx*dx + dy*dy < (n.r+4)*(n.r+4)) return n;
  }
  return null;
}

function hitTestEdge(gx, gy) {
  let best = null, bestDist = 8;
  graphEdges.forEach(e => {
    const a = graphNodes[e.source], b = graphNodes[e.target];
    // point-to-segment
    const dx = b.x-a.x, dy = b.y-a.y;
    const len2 = dx*dx+dy*dy;
    if (len2 === 0) return;
    let t = ((gx-a.x)*dx+(gy-a.y)*dy)/len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x+t*dx, py = a.y+t*dy;
    const d = Math.sqrt((gx-px)*(gx-px)+(gy-py)*(gy-py));
    if (d < bestDist) { bestDist = d; best = e; }
  });
  return best;
}

function initGraphEvents() {
  const c = document.getElementById('graphCanvas');
  const tip = document.getElementById('tooltip');

  c.addEventListener('mousedown', e => {
    const rect = c.getBoundingClientRect();
    const p = screenToGraph(e.clientX - rect.left, e.clientY - rect.top);
    const node = hitTestNode(p.x, p.y);
    if (node) {
      dragging = node;
      c.style.cursor = 'grabbing';
    } else {
      panning = true;
      panStart = { x: e.clientX, y: e.clientY };
      panOffset = { x: offsetX, y: offsetY };
      c.style.cursor = 'grabbing';
    }
  });

  c.addEventListener('mousemove', e => {
    const rect = c.getBoundingClientRect();
    if (dragging) {
      const p = screenToGraph(e.clientX - rect.left, e.clientY - rect.top);
      dragging.x = p.x;
      dragging.y = p.y;
      drawGraph();
      return;
    }
    if (panning) {
      offsetX = panOffset.x + (e.clientX - panStart.x);
      offsetY = panOffset.y + (e.clientY - panStart.y);
      drawGraph();
      return;
    }

    const p = screenToGraph(e.clientX - rect.left, e.clientY - rect.top);
    const node = hitTestNode(p.x, p.y);
    const oldHover = hoveredNode;
    hoveredNode = node;

    if (!node) {
      const edge = hitTestEdge(p.x, p.y);
      hoveredEdge = edge;
      if (edge) {
        const sn = nodeMap[edge.sourceId], tn = nodeMap[edge.targetId];
        tip.innerHTML = `<div class="tooltip-title">${sn.name} ↔ ${tn.name}</div>
          <div class="tooltip-link-info">
            评级 <span style="color:${ratingColors[edge.rating]};font-weight:700">${edge.rating}</span> · 深度 ${'●'.repeat(edge.depth)}${'○'.repeat(5-edge.depth)}<br/>
            ${edge.note}
          </div>`;
        tip.classList.add('show');
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top = (e.clientY - 10) + 'px';
        c.style.cursor = 'pointer';
      } else {
        tip.classList.remove('show');
        c.style.cursor = 'grab';
      }
    } else {
      hoveredEdge = null;
      const icon = node.type === 'culture' ? '🏛' : '🎮';
      const badge = node.type === 'culture'
        ? `<span class="tooltip-badge" style="background:#f3e8ff;color:#7c3aed">${node.category}</span>`
        : `<span class="tooltip-badge" style="background:#dbeafe;color:#2563eb">${node.genre}</span>`;
      tip.innerHTML = `<div class="tooltip-title">${icon} ${node.name} ${badge}</div>
        <div class="tooltip-desc">${node.desc}</div>`;
      tip.classList.add('show');
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top = (e.clientY - 10) + 'px';
      c.style.cursor = 'pointer';
    }

    if (hoveredNode !== oldHover || hoveredEdge) drawGraph();
  });

  c.addEventListener('mouseup', () => {
    dragging = null;
    panning = false;
    c.style.cursor = 'grab';
  });

  c.addEventListener('mouseleave', () => {
    dragging = null;
    panning = false;
    hoveredNode = null;
    hoveredEdge = null;
    tip.classList.remove('show');
    drawGraph();
  });

  c.addEventListener('click', e => {
    const rect = c.getBoundingClientRect();
    const p = screenToGraph(e.clientX - rect.left, e.clientY - rect.top);
    const node = hitTestNode(p.x, p.y);
    if (node) showModal(node);
  });

  c.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.08 : 0.92;
    scale *= factor;
    scale = Math.max(0.3, Math.min(3, scale));
    drawGraph();
  }, { passive: false });
}

function zoomGraph(factor) {
  scale *= factor;
  scale = Math.max(0.3, Math.min(3, scale));
  drawGraph();
}

function resetGraph() {
  scale = 1; offsetX = 0; offsetY = 0;
  updateAll();
}

// ===================================================================
// TAB 1: 热度趋势 (canvas line chart)
// ===================================================================
function renderTrend(data) {
  const tc = document.getElementById('trendCanvas');
  const pane = tc.parentElement;
  const rect = pane.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  tc.width = w * devicePixelRatio;
  tc.height = h * devicePixelRatio;
  tc.style.width = w + 'px';
  tc.style.height = h + 'px';
  const c = tc.getContext('2d');
  c.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

  const years = [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
  const pad = { top:30, right:30, bottom:36, left:50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  // Count links per year
  const counts = {};
  const ratingCounts = { S:{}, A:{}, B:{} };
  years.forEach(y => {
    counts[y] = links.filter(l => l.year <= y).length;
    ['S','A','B'].forEach(r => {
      ratingCounts[r][y] = links.filter(l => l.year <= y && l.rating === r).length;
    });
  });

  const maxVal = Math.max(...Object.values(counts), 1);

  // grid
  c.strokeStyle = '#eee';
  c.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + ch * i / 5;
    c.beginPath(); c.moveTo(pad.left, y); c.lineTo(pad.left+cw, y); c.stroke();
    c.fillStyle = '#a1a1a6';
    c.font = '11px -apple-system, sans-serif';
    c.textAlign = 'right';
    c.fillText(Math.round(maxVal * (5-i)/5), pad.left-8, y+4);
  }

  // x labels
  c.textAlign = 'center';
  c.fillStyle = '#a1a1a6';
  years.forEach((yr,i) => {
    const x = pad.left + cw * i / (years.length-1);
    c.fillText(yr, x, h - pad.bottom + 20);
  });

  // draw lines
  function drawLine(dataObj, color, label) {
    c.beginPath();
    c.strokeStyle = color;
    c.lineWidth = 2.5;
    c.lineJoin = 'round';
    years.forEach((yr,i) => {
      const x = pad.left + cw * i / (years.length-1);
      const y = pad.top + ch * (1 - (dataObj[yr]||0)/maxVal);
      i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    });
    c.stroke();

    // dots
    years.forEach((yr,i) => {
      const x = pad.left + cw * i / (years.length-1);
      const y = pad.top + ch * (1 - (dataObj[yr]||0)/maxVal);
      c.beginPath();
      c.arc(x, y, 3.5, 0, Math.PI*2);
      c.fillStyle = '#fff';
      c.fill();
      c.strokeStyle = color;
      c.lineWidth = 2;
      c.stroke();
    });
  }

  drawLine(counts, '#0071e3', '总联动');
  drawLine(ratingCounts.S, '#ff6b6b', 'S级');
  drawLine(ratingCounts.A, '#ffa94d', 'A级');

  // legend
  const legends = [['总联动','#0071e3'],['S级','#ff6b6b'],['A级','#ffa94d']];
  let lx = pad.left + 10;
  legends.forEach(([lb,cl]) => {
    c.fillStyle = cl;
    c.fillRect(lx, 8, 16, 3);
    c.fillStyle = '#6e6e73';
    c.font = '11px -apple-system, sans-serif';
    c.textAlign = 'left';
    c.fillText(lb, lx+20, 13);
    lx += 70;
  });
}

// ===================================================================
// TAB 2: 效果对比 (横向条形图卡片)
// ===================================================================
function renderRadar(data) {
  const container = document.getElementById('radarContainer');
  
  // 按联动数量排序取top游戏
  const gameLinkCount = {};
  gameNodes.forEach(g => {
    gameLinkCount[g.id] = data.links.filter(l => l.source === g.id || l.target === g.id).length;
  });
  const topGames = [...gameNodes]
    .filter(g => gameLinkCount[g.id] > 0)
    .sort((a,b) => (gameLinkCount[b.id]||0) - (gameLinkCount[a.id]||0))
    .slice(0, 8);

  const barColors = {
    '联动数量': '#0071e3',
    '平均深度': '#34c759',
    'S级占比': '#ff6b6b',
    '文化覆盖': '#af52de',
    '近期活跃': '#ff9500',
  };

  container.innerHTML = topGames.map(g => {
    const gLinks = data.links.filter(l => l.source === g.id || l.target === g.id);
    const count = gLinks.length;
    const avgDepth = count ? (gLinks.reduce((s,l) => s+l.depth, 0)/count) : 0;
    const sRatio = count ? (gLinks.filter(l => l.rating==='S').length/count) : 0;
    const cultureCount = new Set(gLinks.map(l => l.source.startsWith('c') ? l.source : l.target)).size;
    const recentCount = gLinks.filter(l => l.year >= 2023).length;

    // 综合评分 (0-100)
    const score = Math.round(
      (Math.min(count/6, 1) * 25) +
      (avgDepth/5 * 25) +
      (sRatio * 25) +
      (Math.min(cultureCount/5, 1) * 15) +
      (Math.min(recentCount/4, 1) * 10)
    );

    const bars = [
      { label: '联动数量', value: Math.min(count/6, 1) * 100, display: count + '条' },
      { label: '平均深度', value: avgDepth/5 * 100, display: avgDepth.toFixed(1) + '/5' },
      { label: 'S级占比', value: sRatio * 100, display: Math.round(sRatio*100) + '%' },
      { label: '文化覆盖', value: Math.min(cultureCount/5, 1) * 100, display: cultureCount + '类' },
      { label: '近期活跃', value: Math.min(recentCount/4, 1) * 100, display: recentCount + '条' },
    ];

    return `<div class="compare-card">
      <div class="compare-header">
        <div class="compare-name">
          🎮 ${g.name}
          <span class="compare-badge">${g.genre}</span>
        </div>
        <div class="compare-score">${score}</div>
      </div>
      <div class="compare-bars">
        ${bars.map(b => `<div class="bar-row">
          <span class="bar-label">${b.label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${b.value}%;background:${barColors[b.label]}"></div>
          </div>
          <span class="bar-value">${b.display}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ===================================================================
// TAB 3: 案例详情（三层导航）
// ===================================================================
let caseViewState = { level: 1, cultureId: null }; // level: 1=文化列表, 2=联动合集

function renderCases(data) {
  if (caseViewState.level === 2 && caseViewState.cultureId) {
    renderCaseLevel2(data, caseViewState.cultureId);
  } else {
    renderCaseLevel1(data);
  }
}

// 第1层：按文化主题分组展示
function renderCaseLevel1(data) {
  const el = document.getElementById('caseGrid');
  caseViewState = { level: 1, cultureId: null };

  // 按文化节点分组
  const groups = {};
  data.links.forEach(l => {
    const cn = nodeMap[l.source];
    if (!cn || cn.type !== 'culture') return;
    if (!groups[l.source]) groups[l.source] = { node: cn, links: [] };
    groups[l.source].links.push(l);
  });

  const sorted = Object.values(groups).sort((a, b) => b.links.length - a.links.length);

  el.innerHTML = sorted.map(g => {
    const bestRating = ['S','A','B','C','D'].find(r => g.links.some(l => l.rating === r)) || 'D';
    const gameNames = [...new Set(g.links.map(l => nodeMap[l.target]?.name).filter(Boolean))].slice(0, 3);
    const hasDetails = g.links.some(l => caseDetails[l.source + '|' + l.target]);
    return `<div class="culture-group-card" onclick="openCultureGroup('${g.node.id}')">
      <div class="culture-group-left">
        <div class="culture-group-name">🏛 ${g.node.name}${hasDetails ? ' <span style="font-size:10px;color:var(--accent);font-weight:400">有详情</span>' : ''}</div>
        <div class="culture-group-meta">${gameNames.join('、')}${g.links.length > 3 ? ' 等' : ''} · 最高${bestRating}级</div>
      </div>
      <div class="culture-group-right">
        <div class="culture-group-count">${g.links.length}</div>
        <div class="culture-group-arrow">›</div>
      </div>
    </div>`;
  }).join('');
}

function openCultureGroup(cultureId) {
  caseViewState = { level: 2, cultureId };
  const data = getFiltered();
  renderCaseLevel2(data, cultureId);
}

// 第2层：某文化主题下的联动案例列表
function renderCaseLevel2(data, cultureId) {
  const el = document.getElementById('caseGrid');
  const cn = nodeMap[cultureId];
  const groupLinks = data.links.filter(l => l.source === cultureId);
  const sorted = groupLinks.sort((a,b) => {
    const ro = {S:0,A:1,B:2,C:3,D:4};
    return (ro[a.rating]||4) - (ro[b.rating]||4) || b.depth - a.depth;
  });

  let html = `<div style="grid-column:1/-1">
    <div class="case-nav-back" onclick="backToCaseList()">← 返回文化主题列表</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">🏛 ${cn.name}</div>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">${cn.desc} · 共 ${sorted.length} 条联动案例</div>
  </div>`;

  html += sorted.map(l => {
    const tn = nodeMap[l.target];
    const detailKey = l.source + '|' + l.target;
    const hasDetail = !!caseDetails[detailKey];
    return `<div class="case-card" onclick='handleCaseClick("${l.source}","${l.target}")'>
      <div class="case-header">
        <div class="case-pair">
          <span>🎮 ${tn.name}</span>
        </div>
        <div class="case-badges">
          ${hasDetail ? '<span style="font-size:10px;color:var(--accent);margin-right:4px">详情 →</span>' : ''}
          <span class="case-depth">${'●'.repeat(l.depth)}${'○'.repeat(5-l.depth)}</span>
          <span class="case-rating" style="background:${ratingColors[l.rating]}">${l.rating}</span>
        </div>
      </div>
      <div class="case-note">${l.note}</div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

function backToCaseList() {
  caseViewState = { level: 1, cultureId: null };
  const data = getFiltered();
  renderCaseLevel1(data);
}

function handleCaseClick(sourceId, targetId) {
  const detailKey = sourceId + '|' + targetId;
  const detail = caseDetails[detailKey];
  if (detail) {
    showCaseDetail(detail, sourceId, targetId);
  } else {
    // 无详情时显示节点Modal
    const node = nodeMap[targetId];
    if (node) showModal(node);
  }
}

function showCaseDetail(d, sourceId, targetId) {
  const link = links.find(l => l.source === sourceId && l.target === targetId);
  const rating = link ? link.rating : '-';
  const depth = link ? link.depth : 0;

  document.getElementById('modalTitle').innerHTML = `
    <span style="font-size:15px">${d.title}</span>
    <span class="modal-type-badge badge-culture">${rating}级 · 深度${'●'.repeat(depth)}${'○'.repeat(5-depth)}</span>`;
  document.getElementById('modalDesc').textContent = '';

  const relsEl = document.getElementById('modalRels');
  relsEl.innerHTML = `
    <div class="detail-section">
      <div class="detail-row"><span class="detail-label">游戏产品</span><span class="detail-value">${d.game}</span></div>
      <div class="detail-row"><span class="detail-label">文化方向</span><span class="detail-value">${d.culture}</span></div>
      <div class="detail-row"><span class="detail-label">联动时间</span><span class="detail-value">${d.time}</span></div>
      <div class="detail-row"><span class="detail-label">合作方</span><span class="detail-value">${d.partner}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-heading">📋 联动内容形式</div>
      <div class="detail-text">${d.form}</div>
    </div>
    <div class="detail-section">
      <div class="detail-heading">💬 用户反馈与社区讨论</div>
      <div class="detail-text">${d.userFeedback}</div>
    </div>
    <div class="detail-section">
      <div class="detail-heading">💰 流水表现</div>
      <div class="detail-text ${d.revenue.includes('数据缺失') ? 'detail-missing' : ''}">${d.revenue}</div>
    </div>
    <div class="detail-section">
      <div class="detail-heading">🔥 社区讨论热度</div>
      <div class="detail-text">${d.socialBuzz}</div>
    </div>
    <div class="detail-section">
      <div class="detail-heading">📈 付费转化</div>
      <div class="detail-text">${d.conversionNote}</div>
    </div>
    <div class="detail-section" style="border-top:1px solid var(--border);padding-top:10px;margin-top:6px">
      <div class="detail-row"><span class="detail-label">参考来源</span><span class="detail-value" style="color:var(--text-tertiary)">${d.source}</span></div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

// ===================================================================
// INIT
// ===================================================================
function init() {
  initFilters();
  initGraphEvents();
  updateAll();

  window.addEventListener('resize', () => {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    drawGraph();
    const d = getFiltered();
    renderTrend(d);
    renderRadar(d);
  });
}

init();
</script>

</html>
